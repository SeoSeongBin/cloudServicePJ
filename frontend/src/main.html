<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page 마크업</title>
</head>
<script>
    document.addEventListener('DOMContentLoaded', function(e) {
        const userInfoBox = document.querySelector(".header_ui_select_wrap");
        document.querySelector(".user_info_wrap").addEventListener("click", function(e) {
            const icon = this.querySelector("i");
 
            if (icon.classList.contains("fa-angle-down")) {
                icon.classList.replace("fa-angle-down", "fa-angle-up");
                userInfoBox.classList.remove("dn");
            } else {
                icon.classList.replace("fa-angle-up", "fa-angle-down");
                userInfoBox.classList.add("dn");
            }
        });

        let menu = document.querySelectorAll(".menu")

        menu.forEach(ele => {
            ele.addEventListener("click", function(){
                menu.forEach(eleMenu => eleMenu.classList.remove("on"));

                this.classList.add("on");
            })
        });
    })
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="./reset.css">
<style>
    header {
        display: flex;
        align-items: center; /* 세로 중앙 정렬 */
        gap: 20px; /* 요소 사이 간격 (선택사항) */
        border-bottom: 1px solid #ddd;
        box-shadow: -1px -1px 6px 2px rgba(0,0,0,0.18);
        -webkit-box-shadow: -1px -1px 6px 2px rgba(0,0,0,0.18);
        -moz-box-shadow: -1px -1px 6px 2px rgba(0,0,0,0.18);
        position: relative;
        z-index: 1;
    }

    header > * {
        padding: 10px;
    }

    /* 두 번째 자식 요소만 공간을 다 차지하도록 설정 */
    header > *:nth-child(2) {
        flex: 1; /* flex-grow: 1, flex-shrink: 1, flex-basis: 0% 의 축약형 */
    }

    header .header_left {
        
    }

    header .header_left h1.logo {
        font-size: 24px;
        font-weight: bold;
        cursor: pointer;
    }

    .header_user_ui_wrap {
        position: relative;
        cursor: pointer;
    }

    .header_ui_select_wrap {
        position: absolute;
        top: 24px;
        right: 2px;
        border: 1px solid #ddd;
        width: 100px;
        overflow: hidden;
        border-radius: 10px;
        background-color: #fff;
    }
    .header_ui_select_wrap p {
        display: inline-flex; /* p 태그 자체도 콘텐츠만큼만 너비를 가짐 */
        align-items: center;  /* 수직 중앙 정렬 */
        border-bottom: 1px solid #ddd;
        width: 100%;
        padding: 10px;
        vertical-align: middle;
    }
    .header_ui_select_wrap p > * {
        flex: 1;
    }
    .header_ui_select_wrap p:last-child {
        border: none;
    }

    .header_ui_select_wrap p:hover{
        background-color: rgb(83, 83, 238);
        color: #fff;
    }

    .header_ui_select_wrap span{
        display: flex;
        /* align-items: center; */
        justify-content: center;
        /* width를 주지 않으면 아이콘 크기에 딱 맞게 조절됩니다. */
    }

    /* 나머지 요소들은 자기 크기만큼만 가짐 (기본값) */
    header > *:not(:nth-child(2)) {
        flex: none; /* 크기가 변하지 않도록 고정 */
    }

    #navi {
        position: relative;
        width: 200px;
        height: calc(100dvh - 45px);
        background-color: #f6f6f6;
        vertical-align: top;
        display: inline-block;
    }
    #navi .naviTit {
        font-size: 18px;
        text-align: center;
        padding: 10px 20px;
        font-weight: bold;
        border-bottom: 1px solid #ddd;
    }

    #navi p {
        padding: 10px;
        font-size: 16px;
        cursor: pointer;
    }

    #navi p:hover {
        background-color: rgba(83, 83, 238, 0.7);
        color: #fff;
        font-weight: bold;
    }
    #navi p.on {
        background-color: rgb(83, 83, 238);
        color: #fff;
        font-weight: bold;
    }

    #contents {
        box-sizing: border-box;
        display: inline-block;
        vertical-align: top;
        width: calc(100% - 245px);
        padding-top: 20px;
        padding-left: 20px;
        padding-right: 20px;
    }

    #contents .content_header {
        display: flex;
        margin-bottom: 20px;
    }
    #contents .content_header .content_tit {
        font-size: 20px;
        font-weight: bold;
    }

    #contents .content_btn_area {
        display: flex;
        gap: 5px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 20px;
        margin-bottom: 10px;
    }

    #contents .content_btn_area .btn {
        padding: 5px 10px;
        border: 1px solid #aaa;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        color: #222;
    }

    #contents .content_btn_area .btn.file_upload_btn {
        border: 1px solid rgb(64, 118, 255);
        background-color: rgb(64, 118, 255);
        color: #fff;
    }
    #contents .content_btn_area .btn.file_delete_btn {
        border: 1px solid rgb(230, 26, 63);
        color: rgb(230, 26, 63);
        padding: 5px;
        transition: 0.4s;
    }
    #contents .content_btn_area .btn.file_delete_btn:hover {
        border: 1px solid rgb(230, 26, 63);
        background-color: rgb(230, 26, 63);
        color: #fff;
        padding: 5px;
    }

    #contents .content_btn_area .btn.all_chk_btn.on {
        border: 1px solid rgb(64, 118, 255);
        background-color: rgb(64, 118, 255);
        color: #fff;
    }

    #contents .file_wrap {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    #contents .file_wrap .file{
        width: 130px;
        height: 130px;
        border: 1px solid #ddd;
        border-radius: 5px;
    }

    #contents .file_wrap .file:hover {
        background-color: #d5e0ff7e;
    }

    #contents .file_wrap .file.on {
        border: 1px solid rgb(137, 170, 255);
        background-color: #d5e0ff7e;
    }

    .upload_waiting_area {
        position: fixed;
        bottom: 10px;
        right: 10px;
        /* padding: 10px; */
        border-radius: 10px;
        height: 400px;
        width: 300px;
        box-shadow: 2px 2px 20px 0px rgba(0,0,0,0.2);
        -webkit-box-shadow: 2px 2px 20px 0px rgba(0,0,0,0.2);
        -moz-box-shadow: 2px 2px 20px 0px rgba(0,0,0,0.2);
        overflow: hidden;
        background-color: #fff;
    }

    .upload_waiting_area .waiting_header{
        padding: 15px;
        border-bottom: 1px solid #eee;
    }

    .upload_waiting_area .waiting_header h2 {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
        position: relative;
    }
    .upload_waiting_area .waiting_header h2 span {
        font-size: 13px;
        margin-bottom: 10px;
        font-weight: normal;
    }

    .upload_waiting_area .waiting_header .waiting_file_progress_bar {
        width: 100%;
        height: 5px;
        background-color: #ddd;
        overflow: hidden;
        border-radius: 10px;
    }

    .upload_waiting_area .waiting_header .waiting_file_progress_bar .waiting_file_gager {
        height: 100%;
        width: 10%;
        background-color: rgb(64, 118, 255);
    }

    .upload_waiting_area .waiting_list {
        height: calc(100% - 104px);
        border-bottom: 1px solid #eee;
        overflow-y: auto;
    }

    .upload_waiting_area .waiting_list::-webkit-scrollbar {
        width: 3px;  /* 세로축 스크롤바 폭 너비 */
        height: 10px;  /* 가로축 스크롤바 폭 너비 */
        background-color: #ddd;
    }

    .upload_waiting_area .waiting_list::-webkit-scrollbar-thumb {
        background: rgb(64, 118, 255); /* 스크롤바 막대 색상 */
        border: 2px solid rgb(64, 118, 255); /* 스크롤바 막대 테두리 설정  */
        border-radius: 12px 12px 12px 12px;
    }

    .upload_waiting_area .waiting_list .waiting_file {
        display: flex;
        align-items: center;
        padding: 10px 5px;
    }

    .upload_waiting_area .waiting_list .waiting_file:hover {
        background-color: #d1d1d16b;
    }

    .upload_waiting_area .waiting_list .waiting_file .file_icon {
        flex: 1;
        text-align: center;
        font-size: 25px;
        color: #f3c728;
    }
    .upload_waiting_area .waiting_list .waiting_file .file_info {
        flex: 5;
    }
    .upload_waiting_area .waiting_list .waiting_file .file_info .file_name {
        font-size: 14px;
        margin-bottom: 3px;
        line-height: 18px;
    }
    .upload_waiting_area .waiting_list .waiting_file .file_info .file_size {
        font-size: 12px;
    }
    .upload_waiting_area .waiting_list .waiting_file .waiting_file_status {
        flex: 1;
        text-align: center;
        font-size: 18px;
    }

    .upload_waiting_area .waiting_list .waiting_file .waiting_file_status .fa-circle-pause {
        color: #333;
    }
    .upload_waiting_area .waiting_list .waiting_file .waiting_file_status .fa-arrows-rotate {
        color: #333;
        animation: rotate_image 5s linear infinite;
    }
    @keyframes rotate_image{
        100% {
            transform: rotate(360deg);
        }
    }

    .upload_waiting_area .waiting_list .waiting_file .waiting_file_status .fa-circle-check {
        color: rgb(0, 167, 14);
    }

    .upload_waiting_area .upload_waiting_btn_area {
        display: flex;
    }
    .upload_waiting_area .upload_waiting_btn_area .btn {
        display: inline-block;
        flex: 1;
        height: 100%;
        padding: 12px 0;
        justify-items: center;
        align-items: center;
        text-align: center;
        cursor: pointer;
    }

    .upload_waiting_area .upload_waiting_btn_area .btn.start_upload_btn {
        background-color: rgb(0, 229, 19);
        color: #fff;
        font-weight: bold;
    }

    .upload_show_btn {
        position: fixed;
        right: 20px;
        bottom: 20px;
        width: 20px;
        height: 20px;
        background-color: rgba(64, 118, 255, 0.5);
        padding: 5px;
        border-radius: 50px;
        color: #fff;
        cursor: pointer;
    }

    .upload_show_btn:hover {
        background-color: rgba(64, 118, 255, 1);
    }

    .name_popup_wrap {
        position: fixed;
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        z-index: 1;
    }

    .name_popup_wrap .pop_bac {
        width: 100%;
        height: 100%;
        background-color: #00000043;
    }

    .name_popup_wrap .name_pop_content {
        width: 300px;
        /* height: 200px; */
        background-color: #fff;
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        border-radius: 5px;
        padding: 15px 20px;
    }

    .name_popup_wrap .name_pop_content h3 {
        /* padding: 20px; */
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .name_popup_wrap .name_pop_content .name_input {
        margin: 0 auto;
        display: block;
        width: calc(100% - 15px);
        height: 20px;
        margin-bottom: 20px;
        padding: 5px;
    }

    .name_pop_content .name_pop_btn_area {
        text-align: center;
        font-size: 0;
    }

    .name_pop_content .name_pop_btn_area div {
        display: inline-block;
        /* width: 50px;
        height: 20px; */
        padding: 5px 10px;
        border: 1px solid #333;
        border-radius: 2px;
        font-size: 14px;
        cursor: pointer;
    }
    .name_pop_content .name_pop_btn_area div:first-child {
        margin-right: 10px;
    }
    .dn{
        display: none;
    }

    .fa-xmark {
        float: right;
        cursor: pointer;
    }
</style>
<body>
    <!-- 혜더영역 마크업 -->
    <header>
        <div class="header_left">
            <h1 class="logo">Cloud Project</h1>
        </div>
        <div class="header_center"></div>
        <div class="header_right">
            <div class="header_user_ui_wrap">
                <p class="user_info_wrap">유저명 <span><i class="fa-solid fa-angle-down"></i></span></p>
                <div class="header_ui_select_wrap dn">
                    <p>회원정보 <span><i class="fa-solid fa-circle-user"></i></span></p>
                    <p>로그아웃 <span><i class="fa-solid fa-right-from-bracket"></i></span></p>
                </div>
            </div>
        </div>
    </header>
    <!-- 사이드 navi 마크업 -->
    <div id="navi">
        <div class="navi_active_btn"></div>
        <h2 class="naviTit">Menu List</h2>
        <p class="menu on">My Cloud</p>
        <p class="menu">Graph</p>
    </div>

    <div id="contents">
        <div class="content_header">
            <div class="content_header_left">
                <h2 class="content_tit">My Cloud</h2>
            </div>
            <div class="content_header_right">
                
            </div>
        </div>
        
        <div class="content_btn_area">
            <div class="btn all_chk_btn">전체선택 <i class="fa-solid fa-square-check"></i><i class="fa-regular fa-square"></i></div>
            <div class="btn file_upload_btn">업로드 <i class="fa-solid fa-upload"></i></div>
            <div class="btn file_delete_btn"><i class="fa-solid fa-trash-can"></i></div>
        </div>

        <div class="upload_show_btn">
            <i class="fa-solid fa-arrow-up-from-bracket"></i>
        </div>

        <div class="upload_waiting_area">
            <div class="waiting_header">
                <h2>업로드 <span>( / 개 완료 )</span> <i class="fa-solid fa-xmark"></i></h2>
                <div class="waiting_file_progress_bar">
                    <div class="waiting_file_gager"></div>
                </div>
            </div>
            <div class="waiting_list">
                <div class="waiting_file">
                    <div class="file_icon">
                        <i class="fa-solid fa-file"></i>
                    </div>
                    <div class="file_info">
                        <p class="file_name">파일명파일명파일명파일명파일명파일명파일명.확장자</p>
                        <p class="file_size">24 mb</p>
                    </div>
                    <div class="waiting_file_status">
                        <!-- 대기상태 아이콘 -->
                        <i class="fa-solid fa-circle-pause"></i>
                        <!-- 완료 아이콘 -->
                        <!-- <i class="fa-solid fa-circle-check"></i> -->
                        <!-- 업로드 진행중 아이콘 -->
                        <!-- <i class="fa-solid fa-arrows-rotate"></i> -->
                    </div>
                </div>
            </div>
            <div class="upload_waiting_btn_area">
                <div class="btn start_upload_btn">시작</div>
                <div class="btn stop_upload_btn">일시정지</div>
            </div>
        </div>

        <div class="file_wrap">
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
            <div class="file"></div>
        </div>
    </div>

    <div class="name_popup_wrap">
        <div class="pop_bac"></div>
        <div class="name_pop_content">
            <h3>새 폴더 <i class="fa-solid fa-xmark"></i></h3>
            <input class="name_input" type="text" placeholder="이름을 입력해주세요">
            <div class="name_pop_btn_area">
                <div class="save_btn">확인</div>
                <div class="close_btn">닫기</div>
            </div>
        </div>
    </div>
</body>
</html>
